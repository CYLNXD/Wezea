# ─── mta-sts.wezea.net — Politique MTA-STS ──────────────────────────────────────
# Fichier : /etc/nginx/sites-available/mta-sts.wezea.net
#
# MTA-STS (Mail Transfer Agent Strict Transport Security — RFC 8461)
# Force le chiffrement TLS des emails entrants en publiant une politique lisible
# par les serveurs SMTP expéditeurs.
#
# ⚠️  Pré-requis AVANT de déployer ce fichier :
#   1. Ajouter l'enregistrement DNS A  : mta-sts.wezea.net → 83.228.217.154
#   2. Ajouter l'enregistrement DNS TXT : _mta-sts.wezea.net → "v=STSv1; id=20260309000000"
#   3. Obtenir le certificat SSL :
#        sudo certbot --nginx -d mta-sts.wezea.net
#
# Déploiement :
#   sudo cp infra/nginx-mta-sts.conf /etc/nginx/sites-available/mta-sts.wezea.net
#   sudo ln -sf /etc/nginx/sites-available/mta-sts.wezea.net \
#               /etc/nginx/sites-enabled/mta-sts.wezea.net
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mta-sts.wezea.net   # obtenir le certificat
#   sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name mta-sts.wezea.net;
    server_tokens off;
    return 301 https://mta-sts.wezea.net$request_uri;
}

# ── Serveur HTTPS — sert uniquement le fichier de politique MTA-STS ────────────
server {
    listen 443 ssl http2;
    server_name mta-sts.wezea.net;
    server_tokens off;

    # ── Certificats Let's Encrypt (obtenir avec certbot ci-dessus) ────────────
    ssl_certificate     /etc/letsencrypt/live/mta-sts.wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mta-sts.wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de sécurité minimaux
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Politique MTA-STS — servie inline via return ───────────────────────────
    # RFC 8461 §3.2 : Content-Type doit être "text/plain"
    # Le fichier doit être accessible à :
    #   GET https://mta-sts.wezea.net/.well-known/mta-sts.txt
    location = /.well-known/mta-sts.txt {
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "max-age=86400";
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Politique MTA-STS :
        #   mode: enforce  → rejette les connexions SMTP non chiffrées (TLS obligatoire)
        #   mx: mail.infomaniak.com → serveur MX d'Infomaniak
        #   max_age: 604800 → politique valide 7 jours (commencer par une durée courte)
        #
        # ⚠️  Vérifier d'abord les serveurs MX réels avec : dig MX wezea.net
        #     Remplacer les valeurs mx: ci-dessous par les MX exacts de votre domaine.
        return 200 "version: STSv1\nmode: enforce\nmx: mail.infomaniak.com\nmx: *.infomaniak.com\nmax_age: 604800\n";
    }

    # Toute autre URL → 404 (ce sous-domaine ne sert QUE la politique MTA-STS)
    location / {
        return 404;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mta-sts-access.log;
    error_log  /var/log/nginx/mta-sts-error.log warn;
}
