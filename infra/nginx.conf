# ─── Wezea Scanner — Configuration Nginx ─────────────────────────────────────
# Fichier : /etc/nginx/sites-available/cyberhealth
#
# Activer avec :
#   sudo ln -s /etc/nginx/sites-available/cyberhealth /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Zones de rate limiting ────────────────────────────────────────────────────
# auth_limit : 5 req/min par IP sur login/register (anti brute-force)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# api_limit   : 30 req/min par IP sur l'API générale
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

# ── Bloc HTTP → redirection HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    server_name scan.wezea.net;
    return 301 https://$host$request_uri;
}

# ── Serveur principal HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;          # ← Décommenter après certbot
    server_name scan.wezea.net;

    # Certificats SSL (générés par certbot)
    # ssl_certificate     /etc/letsencrypt/live/scan.wezea.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/scan.wezea.net/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Dossier racine du frontend React ──────────────────────────────────────
    root /var/www/cyberhealth;
    index index.html;

    # ── Headers de sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options "DENY"                  always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection "1; mode=block"        always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # ── Content Security Policy ───────────────────────────────────────────────
    # Ajuster connect-src si de nouveaux services tiers sont ajoutés
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://accounts.google.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self' https://scan.wezea.net https://api.stripe.com https://accounts.google.com;
        frame-src https://accounts.google.com https://js.stripe.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
    " always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Fichiers partagés injectés (nav.js, footer.js) — pas de cache long ───
    location ~* ^/(nav|footer)\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        access_log off;
    }

    # ── Cache des assets statiques (Vite génère des hash dans les noms) ───────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Rate limiting : login et register (anti brute-force) ─────────────────
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Proxy vers l'API FastAPI (toutes les routes backend) ─────────────────
    location ~ ^/(scan|report|health|generate-pdf|auth|payment|admin|contact|monitoring|newsletter|public|docs|redoc|openapi\.json) {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts (le scan peut prendre jusqu'à 60s)
        proxy_connect_timeout   10s;
        proxy_read_timeout     120s;
        proxy_send_timeout      30s;

        # Buffer pour les réponses JSON/PDF
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers     8 16k;

        # Limiter la taille des requêtes entrantes (sécurité)
        client_max_body_size 5M;
    }

    # ── Blog statique HTML ────────────────────────────────────────────────────
    location ^~ /blog/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Agences landing page (statique HTML) ──────────────────────────────────
    location ^~ /agences/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── React SPA — toutes les routes → index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Ne pas cacher index.html (pour les mises à jour SPA)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cyberhealth-access.log;
    error_log  /var/log/nginx/cyberhealth-error.log warn;
}
