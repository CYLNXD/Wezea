# ─── scan.wezea.net — API Backend (FastAPI) ────────────────────────────────────
# Fichier : /etc/nginx/sites-available/scan.wezea.net
#
# ⚠️  Ce fichier configure l'API backend (scan.wezea.net)
#     Il NE configure PAS le frontend → voir nginx-wezea.conf pour wezea.net
#
# Déploiement :
#   sudo cp infra/nginx-scan.conf /etc/nginx/sites-available/scan.wezea.net
#   sudo ln -sf /etc/nginx/sites-available/scan.wezea.net /etc/nginx/sites-enabled/scan.wezea.net
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️  Ne JAMAIS copier ce fichier sur /etc/nginx/sites-available/wezea.net

# ── Zones de rate limiting (contexte http — avant les server blocks) ──────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name scan.wezea.net;
    return 301 https://$host$request_uri;
}

# ── Serveur principal HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name scan.wezea.net;

    # ── Certificats Let's Encrypt ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/scan.wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scan.wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de sécurité ───────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection "1; mode=block"          always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Note : les headers CORS (Access-Control-Allow-Origin…) sont gérés par FastAPI
    #        via la variable CORS_ORIGINS dans backend/.env

    # ── Rate limiting : login et register ────────────────────────────────────
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Proxy vers FastAPI — toutes les routes ────────────────────────────────
    # ⚠️  NE PAS ajouter de try_files ici — tout doit aller vers uvicorn
    location / {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts (le scan peut prendre jusqu'à 60s)
        proxy_connect_timeout   10s;
        proxy_read_timeout     120s;
        proxy_send_timeout      30s;

        # Buffers pour les réponses JSON/PDF
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        client_max_body_size 5M;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/scan-access.log;
    error_log  /var/log/nginx/scan-error.log warn;
}
