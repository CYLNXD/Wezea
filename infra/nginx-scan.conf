# ─── scan.wezea.net — API Backend (FastAPI) ────────────────────────────────────
# Fichier : /etc/nginx/sites-available/scan.wezea.net
#
# ⚠️  Ce fichier configure l'API backend (scan.wezea.net)
#     Il NE configure PAS le frontend → voir nginx-wezea.conf pour wezea.net
#
# Déploiement :
#   sudo cp infra/nginx-scan.conf /etc/nginx/sites-available/scan.wezea.net
#   sudo ln -sf /etc/nginx/sites-available/scan.wezea.net /etc/nginx/sites-enabled/scan.wezea.net
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️  Ne JAMAIS copier ce fichier sur /etc/nginx/sites-available/wezea.net

# ── Zones de rate limiting (contexte http — avant les server blocks) ──────────
# Auth : brute-force protection (5 tentatives/min max)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# API : 5 req/sec avec burst=30 — permet les chargements SPA (15+ requêtes
# parallèles lors d'un login + navigation Dashboard/Admin) tout en protégeant
# contre les abus. L'ancien 30r/m burst=10 bloquait les usages normaux.
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=5r/s;

# ── CORS origin dynamique (pour les réponses d'erreur nginx : 429, 502…) ─────
map $http_origin $cors_origin {
    default "";
    "https://wezea.net"      "https://wezea.net";
    "https://www.wezea.net"  "https://www.wezea.net";
    "http://localhost:3000"  "http://localhost:3000";
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name scan.wezea.net;
    server_tokens off;  # Masque la version nginx dans le header Server
    return 301 https://$host$request_uri;
}

# ── Serveur principal HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name scan.wezea.net;
    server_tokens off;  # Masque la version nginx dans le header Server (audit #6)

    # ── Certificats Let's Encrypt ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/scan.wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scan.wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de sécurité ───────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection "1; mode=block"          always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── CORS headers sur les réponses d'erreur nginx (429, 502…) ──────────────
    # Sans ceci, le navigateur bloque les 429 cross-origin car ils n'ont pas
    # d'en-tête Access-Control-Allow-Origin (FastAPI n'est jamais atteint).
    # Note : FastAPI ajoute ses propres CORS sur les 2xx/3xx — ces headers
    # server-level sont le filet de sécurité pour les erreurs nginx.
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;

    # ── Rate limiting : login et register ────────────────────────────────────
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Admin — pas de rate limit nginx (protégé par auth + is_admin) ───────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Proxy vers FastAPI — toutes les routes ────────────────────────────────
    # ⚠️  NE PAS ajouter de try_files ici — tout doit aller vers uvicorn
    location / {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts (le scan peut prendre jusqu'à 60s)
        proxy_connect_timeout   10s;
        proxy_read_timeout     120s;
        proxy_send_timeout      30s;

        # Buffers pour les réponses JSON/PDF
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        client_max_body_size 5M;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/scan-access.log;
    error_log  /var/log/nginx/scan-error.log warn;
}
