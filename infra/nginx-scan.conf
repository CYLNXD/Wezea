# ─── scan.wezea.net — API Backend (FastAPI) ────────────────────────────────────
# Fichier : /etc/nginx/sites-available/scan.wezea.net
#
# ⚠️  Ce fichier configure l'API backend (scan.wezea.net)
#     Il NE configure PAS le frontend → voir nginx-wezea.conf pour wezea.net
#
# Déploiement :
#   sudo cp infra/nginx-scan.conf /etc/nginx/sites-available/scan.wezea.net
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️  Ne JAMAIS copier ce fichier sur /etc/nginx/sites-available/wezea.net

# ── Zones de rate limiting (contexte http — avant les server blocks) ──────────
# Auth : brute-force protection (5 tentatives/min max)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# API : 10 req/sec avec burst=50 — le SPA envoie 8-12 requêtes en parallèle
# à chaque navigation (OPTIONS preflight + GET = ×2). Deux navigations rapides
# (Dashboard → Admin) peuvent générer 30+ requêtes en <2s.
# burst=50 absorbe ces pics tout en protégeant contre les abus.
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;

# ── CORS origin dynamique (pour les réponses 429 générées par nginx) ──────────
map $http_origin $cors_origin {
    default "";
    "https://wezea.net"      "https://wezea.net";
    "https://www.wezea.net"  "https://www.wezea.net";
    "http://localhost:3000"  "http://localhost:3000";
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name scan.wezea.net;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# ── Serveur principal HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name scan.wezea.net;
    server_tokens off;

    # ── Certificats Let's Encrypt ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/scan.wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scan.wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de sécurité ───────────────────────────────────────────────────
    # ⚠️  PAS de add_header CORS ici — FastAPI gère le CORS via CORSMiddleware.
    #     Ajouter des CORS ici doublerait les headers → rejet par les navigateurs.
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection "1; mode=block"          always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Pages d'erreur avec CORS ────────────────────────────────────────────────
    # Quand nginx génère une réponse d'erreur lui-même (rate limit, backend down),
    # FastAPI n'est jamais atteint → aucun header CORS ajouté → le navigateur
    # bloque la réponse et affiche "CORS policy" au lieu de la vraie erreur.

    # 429 — Rate limit nginx (limit_req)
    error_page 429 = @rate_limited;
    location @rate_limited {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Content-Type "application/json" always;
        add_header Retry-After 1 always;
        return 429 '{"error":"Too Many Requests","detail":"Rate limit exceeded - please retry in a few seconds"}';
    }

    # 502/503/504 — Backend indisponible (restart, crash, timeout)
    # Sans ceci, le navigateur affiche "CORS error" au lieu de "service unavailable"
    # après un deploy ou un restart du service uvicorn.
    error_page 502 503 504 = @backend_down;
    location @backend_down {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Content-Type "application/json" always;
        add_header Retry-After 5 always;
        return 503 '{"error":"Service Unavailable","detail":"The API is restarting, please retry in a few seconds"}';
    }

    # ── Rate limiting : login et register ────────────────────────────────────
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Admin — pas de rate limit nginx (protégé par auth + is_admin) ───────
    # Inclut /admin/* et /partners/admin* (endpoint admin des partenaires)
    location ~ ^/(admin/|partners/admin) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # ── Proxy vers FastAPI — toutes les routes ────────────────────────────────
    # ⚠️  NE PAS ajouter de try_files ici — tout doit aller vers uvicorn
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts (le scan peut prendre jusqu'à 60s)
        proxy_connect_timeout   10s;
        proxy_read_timeout     120s;
        proxy_send_timeout      30s;

        # Buffers pour les réponses JSON/PDF
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        client_max_body_size 5M;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/scan-access.log;
    error_log  /var/log/nginx/scan-error.log warn;
}
