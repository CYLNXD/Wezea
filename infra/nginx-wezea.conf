# ─── wezea.net — Frontend SPA ──────────────────────────────────────────────────
# Fichier : /etc/nginx/sites-available/wezea.net
#
# ⚠️  Ce fichier configure le FRONTEND (wezea.net + www.wezea.net)
#     Il NE configure PAS l'API → voir nginx-scan.conf pour scan.wezea.net
#
# Déploiement :
#   sudo cp infra/nginx-wezea.conf /etc/nginx/sites-available/wezea.net
#   sudo ln -sf /etc/nginx/sites-available/wezea.net /etc/nginx/sites-enabled/wezea.net
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️  Ne JAMAIS copier ce fichier sur /etc/nginx/sites-available/scan.wezea.net
#     (mauvaise racine, mauvais certificat)

# ── Bot detection pour og: meta tags sur /r/{uuid} ──────────────────────────
# Les bots sociaux (WhatsApp, Slack, Twitter…) ne peuvent pas exécuter JS.
# On les redirige vers une page HTML minimale servie par FastAPI (/public/preview/)
# qui contient les og: meta tags + un <meta http-equiv="refresh"> vers la SPA.
map $http_user_agent $is_social_bot {
    default                                              0;
    "~*(facebookexternalhit|facebookcatalog)"            1;
    "~*(Twitterbot|LinkedInBot|WhatsApp|Slackbot)"       1;
    "~*(Slack-ImgProxy|TelegramBot|Discordbot)"          1;
    "~*(SkypeUriPreview|Applebot|redditbot|vkShare)"     1;
    "~*(Googlebot|bingbot|YandexBot|DuckDuckBot)"        1;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name wezea.net www.wezea.net;
    return 301 https://wezea.net$request_uri;
}

# ── www → apex redirect (HTTPS) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.wezea.net;

    ssl_certificate     /etc/letsencrypt/live/wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://wezea.net$request_uri;
}

# ── Serveur principal HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name wezea.net;

    # ── Certificats Let's Encrypt ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/wezea.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wezea.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Racine du build frontend Vite ─────────────────────────────────────────
    root  /home/cyberhealth/app/frontend/dist;
    index index.html;

    # ── Headers de sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options "DENY"                    always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection "1; mode=block"          always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # ── Content Security Policy ───────────────────────────────────────────────
    # Inclut PostHog (f.wezea.net), Google Fonts, Google Sign-In, lh3 avatars
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://us-assets.i.posthog.com https://internal-j.posthog.com https://f.wezea.net https://accounts.google.com https://ssl.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com https://f.wezea.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://f.wezea.net https://lh3.googleusercontent.com; connect-src 'self' https://scan.wezea.net https://f.wezea.net https://accounts.google.com https://us.posthog.com https://internal-j.posthog.com https://us-assets.i.posthog.com; frame-src https://accounts.google.com; worker-src blob:;" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Assets statiques — cache long (Vite met un hash dans les noms de fichiers)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Blog statique HTML (/blog/article-slug/) ──────────────────────────────
    location ^~ /blog/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Landing agences (/agences/) ───────────────────────────────────────────
    location ^~ /agences/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Rapports publics /r/{uuid} — bot detection pour og: meta tags ────────
    # Technique sans "if is evil" : error_page 418 → named location @bot_preview
    location ~ ^/r/(.+)$ {
        error_page 418 = @bot_preview;
        if ($is_social_bot) { return 418; }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Named location : proxy vers FastAPI pour les bots ────────────────────
    location @bot_preview {
        internal;
        rewrite ^/r/(.+)$ /public/preview/$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── React SPA — toutes les routes inconnues → index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/wezea-access.log;
    error_log  /var/log/nginx/wezea-error.log warn;
}
