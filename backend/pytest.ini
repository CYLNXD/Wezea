[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Variables d'env pour les tests (DB en mémoire, pas de secrets réels)
env =
    JWT_SECRET_KEY=test-secret-key-for-ci-only-32-chars-min
    CORS_ORIGINS=http://testserver
    DEBUG=false
    COOKIE_SECURE=false
    COOKIE_SAMESITE=lax

# Masquer les warnings de librairies tierces
filterwarnings =
    ignore::DeprecationWarning:passlib
    ignore::DeprecationWarning:jose
