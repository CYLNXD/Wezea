[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Les variables d'env sont définies directement dans tests/conftest.py
# (via os.environ.setdefault) — pas besoin du plugin pytest-env.

# Masquer les warnings de librairies tierces
filterwarnings =
    ignore::DeprecationWarning:passlib
    ignore::DeprecationWarning:jose
