    <!-- JSON-LD Structured Data — FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Wezea est-il vraiment gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, le plan Free permet 5 scans par jour sans carte bancaire. Les plans Starter (9,90€/mois), Pro (19,90€/mois) et Dev (29,90€/mois) ajoutent des scans illimités, le monitoring continu, les rapports PDF, le DAST actif, le Secret Scanner et des intégrations avancées."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le scanner de sécurité Wezea ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Entrez votre nom de domaine et notre moteur analyse en moins de 60 secondes : SSL/TLS, DNS (SPF, DMARC, DNSSEC, CAA), ports ouverts, headers HTTP, réputation (blacklists), technologies exposées, vulnérabilités CVE connues, scan DAST actif et détection de credentials exposés via Secret Scanner. Le résultat est un score /100 avec un plan d'action priorisé."
          }
        },
        {
          "@type": "Question",
          "name": "Wezea vérifie-t-il la conformité NIS2 et RGPD ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Wezea mappe automatiquement chaque vulnérabilité sur les articles des directives NIS2 (article 21) et RGPD (articles 25 et 32). Vous obtenez un score de conformité sur 12 critères techniques réglementaires, avec un rapport exportable pour vos auditeurs ou votre DPO. Un diagnostic gratuit est disponible sur wezea.net/conformite-nis2."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le DAST actif proposé par Wezea ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le DAST (Dynamic Application Security Testing) effectue des requêtes actives sur vos endpoints pour détecter des panneaux d'administration accessibles sans authentification, des fichiers sensibles exposés (.env, .git), des erreurs de configuration CORS, et d'autres vulnérabilités applicatives. Il complète l'analyse passive de l'infrastructure réseau."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la différence entre le plan Starter et le plan Pro ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le plan Starter (9,90€/mois) inclut les scans illimités, 1 domaine en monitoring, les rapports PDF avancés et les alertes email. Le plan Pro (19,90€/mois) ajoute le monitoring illimité, les rapports en marque blanche, les webhooks, le badge SVG dynamique et l'export JSON/CSV. Le plan Dev (29,90€/mois) ajoute l'API key Bearer et l'Application Scanning."
          }
        },
        {
          "@type": "Question",
          "name": "Wezea peut-il surveiller mon domaine automatiquement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Avec les plans Starter et Pro, vous pouvez activer le monitoring continu avec des alertes configurables par type (baisse de score, nouvelles vulnérabilités CRITICAL, expiration SSL). Un digest hebdomadaire récapitule l'état de tous vos domaines surveillés."
          }
        },
        {
          "@type": "Question",
          "name": "Les rapports PDF peuvent-ils être personnalisés avec mon logo ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, avec le plan Pro ou Dev. La fonctionnalité marque blanche vous permet d'intégrer votre logo, vos couleurs et le nom de votre entreprise dans les rapports PDF. Idéal pour les agences web et les MSP qui souhaitent facturer des audits de sécurité à leurs clients."
          }
        }
      ]
    }
    </script>
